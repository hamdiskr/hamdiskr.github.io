<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        /* Tam ekran ve sıfır kenar boşluğu */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden; /* Kaydırma çubuklarını gizle */
        }
        /* Oynatıcıyı tamamen kapla */
        #ozel-oynatici {
            width: 100%;
            height: 100%;
        }
        /* Video.js'in kendi stilleriyle uyum için */
        .video-js.vjs-fluid {
            height: 100% !important;
            padding-top: 0 !important; /* Fluid oranını kaldır, tam ekran yap */
        }
        /* Oynatıcı kontrol çubuğu isteğe bağlı görünür, isterseniz gizleyebilirsiniz */
        /* .video-js .vjs-control-bar { display: none; } */
    </style>
</head>
<body>
    <!-- Sadece video elementi -->
    <video
        id="ozel-oynatici"
        class="video-js vjs-default-skin"
        controls
        preload="auto"
        data-setup='{}'
    ></video>

    <!-- Video.js Kütüphanesi -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Video linki (sabit)
            const videoUrl = 'https://vs14.gamephotos.pro/v/Baghead.2023.Bluray.1080p.DUAL.x264-HDM/1080.m3u8';

            // Oynatıcıyı başlat
            const player = videojs('ozel-oynatici', {
                controls: true,
                autoplay: false,
                preload: 'auto',
                fluid: false, // Kendi yüksekliğimizi kontrol edeceğiz
                html5: {
                    hls: {
                        enableLowInitialPlaylist: true,
                        smoothQualityChange: true,
                        overrideNative: true
                    }
                }
            });

            // Kaynağı yükle (HLS)
            player.src({
                src: videoUrl,
                type: 'application/x-mpegURL'
            });

            // Hata durumunda sessiz kal (konsola yaz, ekrana bir şey gösterme)
            player.on('error', function() {
                console.error('Video yüklenemedi (CORS veya bağlantı hatası):', videoUrl);
            });
        });
    </script>
</body>
</html>
