<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş Video Oynatıcı</title>
    <!-- Video.js CSS (sadece video elementinin temel stilleri için, kontrolleri kullanmayacağız) -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        /* Temel sıfırlama ve tam ekran */
        * {
            box-sizing: border-box;
            user-select: none; /* Metin seçimini engelle */
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Video konteyneri */
        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: black;
        }

        /* Video elementi */
        #video-player {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* Video oranını koruyarak sığdır */
            background-color: black;
        }

        /* Üst katman - tüm kontroller burada */
        .controls-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Üstte boşluk, ortada butonlar, altta kontrol çubuğu */
            pointer-events: none; /* Tıklamaları alt katmana geçir, ama kontrollerin olduğu bölgelerde pointer-events: auto ile tekrar aktif et */
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Fare hareket ettiğinde veya dokunulduğunda overlay görünür */
        .video-container:hover .controls-overlay,
        .video-container:focus-within .controls-overlay {
            opacity: 1;
        }

        /* Orta aksiyon butonları (oynat/duraklat, ileri/geri) */
        .center-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            pointer-events: none; /* Altındaki butonları etkilemesin, ama butonların kendisi tıklanabilir */
            flex: 1; /* Ortalamak için */
        }

        .action-btn {
            pointer-events: auto;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid white;
            color: white;
            font-size: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .action-btn.small {
            width: 70px;
            height: 70px;
            font-size: 36px;
        }

        .action-btn:hover {
            background: rgba(220, 20, 60, 0.9);
            transform: scale(1.1);
        }

        /* Oynat/Duraklat butonu ikon değişimi */
        .play-pause .play-icon { display: block; }
        .play-pause .pause-icon { display: none; }
        .play-pause.playing .play-icon { display: none; }
        .play-pause.playing .pause-icon { display: block; }

        /* Alt kontrol çubuğu */
        .bottom-controls {
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 20px 30px 30px 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto; /* Bu bölge tıklanabilir */
            margin-bottom: 0;
            transition: opacity 0.3s;
        }

        /* İlerleme çubuğu */
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
        }

        .time-display {
            min-width: 45px;
            text-align: center;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress-filled {
            height: 100%;
            background: #dc143c;
            border-radius: 3px;
            width: 0%;
            pointer-events: none;
        }

        .progress-buffer {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255,255,255,0.5);
            border-radius: 3px;
            width: 0%;
            pointer-events: none;
        }

        .progress-handle {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background: #dc143c;
            border: 2px solid white;
            border-radius: 50%;
            left: 0%;
            margin-left: -7px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-bar:hover .progress-handle {
            opacity: 1;
        }

        /* Alt butonlar (ses, fullscreen, hız) */
        .control-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
            color: white;
        }

        .control-btn-item {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.8;
            transition: opacity 0.2s;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .control-btn-item:hover {
            opacity: 1;
            background: rgba(255,255,255,0.2);
        }

        /* Ses kontrolü */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .volume-filled {
            height: 100%;
            background: #dc143c;
            width: 100%;
            border-radius: 2px;
        }

        .volume-handle {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #dc143c;
            border: 2px solid white;
            border-radius: 50%;
            left: 100%;
            margin-left: -6px;
            pointer-events: none;
        }

        /* Hız seçici */
        .speed-selector {
            background: rgba(0,0,0,0.5);
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .speed-selector option {
            background: black;
        }

        /* Fullscreen butonu */
        .fullscreen-btn {
            margin-left: auto;
        }

        /* Mobil uyumluluk için */
        @media (max-width: 768px) {
            .action-btn {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
            .action-btn.small {
                width: 60px;
                height: 60px;
                font-size: 28px;
            }
            .bottom-controls {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <!-- Video elementi (Video.js kullanmıyoruz, native HTML5 video kullanıp HLS.js ile HLS desteği ekleyeceğiz) -->
        <video id="video-player" preload="auto" playsinline></video>

        <!-- Kontrol overlay -->
        <div class="controls-overlay" id="controlsOverlay">
            <!-- Üstte boşluk (ileride ekstra bilgi eklenebilir) -->
            <div style="height: 20px;"></div>

            <!-- Orta aksiyon butonları -->
            <div class="center-controls">
                <div class="action-btn small" id="geriBtn" title="15 saniye geri">⏪</div>
                <div class="action-btn play-pause" id="playPauseBtn" title="Oynat/Duraklat">
                    <span class="play-icon">▶️</span>
                    <span class="pause-icon">⏸️</span>
                </div>
                <div class="action-btn small" id="ileriBtn" title="15 saniye ileri">⏩</div>
            </div>

            <!-- Alt kontrol çubuğu -->
            <div class="bottom-controls">
                <!-- İlerleme çubuğu + süreler -->
                <div class="progress-container">
                    <span class="time-display" id="currentTime">00:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-buffer" id="bufferBar"></div>
                        <div class="progress-filled" id="progressFilled"></div>
                        <div class="progress-handle" id="progressHandle"></div>
                    </div>
                    <span class="time-display" id="duration">00:00</span>
                </div>

                <!-- Diğer kontroller -->
                <div class="control-buttons">
                    <!-- Ses kontrolü -->
                    <div class="volume-control">
                        <button class="control-btn-item" id="muteBtn">🔊</button>
                        <div class="volume-slider" id="volumeSlider">
                            <div class="volume-filled" id="volumeFilled" style="width: 100%;"></div>
                            <div class="volume-handle" id="volumeHandle" style="left: 100%;"></div>
                        </div>
                    </div>

                    <!-- Oynatma hızı seçici -->
                    <select class="speed-selector" id="speedSelect">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2x</option>
                    </select>

                    <!-- Fullscreen butonu -->
                    <button class="control-btn-item fullscreen-btn" id="fullscreenBtn">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- HLS.js kütüphanesi (m3u8 oynatmak için) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        (function() {
            // Video URL (sabit)
            const videoUrl = 'https://edge1-waw-sprintcdn.r66nv9ed.com/hls2/04/06984/9bmv5nuj73hl_x/index-v1-a1.m3u8?t=fSNXI-3geI6XcOvuXHpZZb1Lad5RUtuWtEbmU3CsGOY&s=1773944827&e=10800&f=34923341&srv=1070&asn=&sp=5500&p=0';
            // CORS proxy (gerekirse yorumu kaldır)
            // const videoUrl = 'https://cors-anywhere.herokuapp.com/https://vs14.gamephotos.pro/v/Baghead.2023.Bluray.1080p.DUAL.x264-HDM/1080.m3u8';

            const video = document.getElementById('video-player');
            const overlay = document.getElementById('controlsOverlay');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const geriBtn = document.getElementById('geriBtn');
            const ileriBtn = document.getElementById('ileriBtn');
            const currentTimeSpan = document.getElementById('currentTime');
            const durationSpan = document.getElementById('duration');
            const progressBar = document.getElementById('progressBar');
            const progressFilled = document.getElementById('progressFilled');
            const bufferBar = document.getElementById('bufferBar');
            const progressHandle = document.getElementById('progressHandle');
            const muteBtn = document.getElementById('muteBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeFilled = document.getElementById('volumeFilled');
            const volumeHandle = document.getElementById('volumeHandle');
            const speedSelect = document.getElementById('speedSelect');
            const fullscreenBtn = document.getElementById('fullscreenBtn');

            // LocalStorage anahtarı
            function getStorageKey() {
                return 'video_progress_' + btoa(videoUrl);
            }

            // --- HLS.js ile m3u8 yükleme ---
            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                });
                hls.loadSource(videoUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    console.log('HLS manifest yüklendi');
                    // Kayıtlı zamanı yükle
                    loadProgress();
                });
                // Buffer ilerlemesini güncelle
                hls.on(Hls.Events.BUFFER_APPENDED, function(event, data) {
                    updateBufferBar();
                });
                // Periyodik buffer güncelleme
                video.addEventListener('progress', updateBufferBar);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari için native HLS desteği
                video.src = videoUrl;
                video.addEventListener('loadedmetadata', function() {
                    loadProgress();
                });
            } else {
                console.error('HLS desteklenmiyor');
                video.src = videoUrl; // Belki mp4 vs.
            }

            // Buffer bar güncelleme
            function updateBufferBar() {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const duration = video.duration;
                    if (duration > 0) {
                        const percent = (bufferedEnd / duration) * 100;
                        bufferBar.style.width = percent + '%';
                    }
                }
            }

            // --- Zamanı localStorage'dan yükle ---
            function loadProgress() {
                const savedTime = localStorage.getItem(getStorageKey());
                if (savedTime && !isNaN(parseFloat(savedTime))) {
                    const time = parseFloat(savedTime);
                    if (time < video.duration) {
                        video.currentTime = time;
                    }
                }
            }

            // Zamanı kaydet (her saniye)
            video.addEventListener('timeupdate', function() {
                const currentTime = video.currentTime;
                if (currentTime > 0) {
                    localStorage.setItem(getStorageKey(), currentTime.toString());
                }
                updateProgress();
            });

            // Progress bar güncelleme
            function updateProgress() {
                if (video.duration) {
                    const percent = (video.currentTime / video.duration) * 100;
                    progressFilled.style.width = percent + '%';
                    progressHandle.style.left = percent + '%';
                }
                currentTimeSpan.textContent = formatTime(video.currentTime);
                durationSpan.textContent = formatTime(video.duration);
            }

            video.addEventListener('loadedmetadata', function() {
                durationSpan.textContent = formatTime(video.duration);
            });

            // Süre formatı (ss:dd)
            function formatTime(seconds) {
                if (isNaN(seconds)) return '00:00';
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = Math.floor(seconds % 60);
                if (h > 0) {
                    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                } else {
                    return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                }
            }

            // --- Oynat/Duraklat ---
            function togglePlay() {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            }

            video.addEventListener('play', function() {
                playPauseBtn.classList.add('playing');
            });
            video.addEventListener('pause', function() {
                playPauseBtn.classList.remove('playing');
            });

            playPauseBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                togglePlay();
            });

            // İleri/Geri
            geriBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                video.currentTime = Math.max(0, video.currentTime - 15);
            });

            ileriBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                video.currentTime = Math.min(video.duration, video.currentTime + 15);
            });

            // Progress bar tıklama ile arama
            progressBar.addEventListener('click', function(e) {
                const rect = progressBar.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const percent = clickX / rect.width;
                video.currentTime = percent * video.duration;
            });

            // Ses kontrolü
            function updateVolumeUI() {
                const volume = video.volume * 100;
                volumeFilled.style.width = volume + '%';
                volumeHandle.style.left = volume + '%';
                muteBtn.textContent = video.muted ? '🔇' : (video.volume > 0.5 ? '🔊' : (video.volume > 0 ? '🔉' : '🔈'));
            }

            video.addEventListener('volumechange', updateVolumeUI);
            updateVolumeUI();

            volumeSlider.addEventListener('click', function(e) {
                const rect = volumeSlider.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const percent = Math.min(1, Math.max(0, clickX / rect.width));
                video.volume = percent;
                video.muted = false;
            });

            muteBtn.addEventListener('click', function() {
                video.muted = !video.muted;
            });

            // Oynatma hızı
            speedSelect.addEventListener('change', function() {
                video.playbackRate = parseFloat(this.value);
            });

            // Fullscreen
            fullscreenBtn.addEventListener('click', function() {
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                } else {
                    document.querySelector('.video-container').requestFullscreen();
                }
            });

            document.addEventListener('fullscreenchange', function() {
                // Fullscreen değiştiğinde bir şey yapmaya gerek yok, zaten stiller uyumlu
            });

            // Overlay'in belirli süre sonra kaybolması için timer
            let hideTimer;
            function resetHideTimer() {
                overlay.style.opacity = '1';
                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    if (!video.paused) { // Sadece video oynuyorken gizle
                        overlay.style.opacity = '0';
                    }
                }, 3000);
            }

            // Fare hareketinde timer'ı sıfırla
            document.querySelector('.video-container').addEventListener('mousemove', resetHideTimer);
            document.querySelector('.video-container').addEventListener('touchstart', resetHideTimer);
            // İlk göster
            resetHideTimer();

            // Eğer video duraklatılırsa overlay hep görünür olsun (isteğe bağlı)
            video.addEventListener('pause', function() {
                overlay.style.opacity = '1';
                clearTimeout(hideTimer);
            });

            video.addEventListener('play', function() {
                // Oynarken timer'ı başlat
                resetHideTimer();
            });

            // Hata durumunda
            video.addEventListener('error', function() {
                console.error('Video hatası');
            });
        })();
    </script>
</body>
</html>
